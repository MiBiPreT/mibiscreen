site_name: mibiscreen
site_description: Prediction tool for Microbiome based Remediation
site_author: Alraune Zech, Sona Aseyednezhad, Robin Richardson, Jaro Camphuijsen 
site_url: https://MiBiPreT.github.io/mibiscreen
repo_name: MiBiPreT/mibiscreen 
repo_url: https://github.com/MiBiPreT/mibiscreen 
edit_uri: "edit/main/docs/"
copyright: Copyright &copy; 2024 Alraune Zech, Sona Aseyednezhad, Robin Richardson, Jaro Camphuijsen

nav:
  - Home: index.md
  - Introduction: introduction/introduction.md
  - Methods: 
    - Overview: methods/overview.md
    - Data: methods/data.md
    - NA Screening: methods/na_screening.md
    - Concentrations: methods/concentrations.md
    - Ordination: methods/ordination.md
    - Stable Isotope Analysis: methods/stable_isotopes.md
  - Examples:
    - Amersfoort Concentrations: examples/ex02_Amersfoort/example_02_amersfoort_concentrations.ipynb 
    - Amersfoort NA Screening: examples/ex02_Amersfoort/example_02_amersfoort_NAscreening.ipynb
    - Amersfoort Metabolites: examples/ex02_Amersfoort/example_02_amersfoort_metabolites.ipynb
    - Amersfoort Isotopes: examples/ex02_Amersfoort/example_02_amersfoort_isotopes_lambda.ipynb
    - Amersfoort Ordination: examples/ex02_Amersfoort/example_02_amersfoort_ordination.ipynb
    - Amersfoort Ordination GQ: examples/ex02_Amersfoort/example_02_amersfoort_ordination_GQ.ipynb
  - Development: development/development.md
  - API Reference:
    - Data: reference/reference_data.md
    - Analysis: reference/reference_analysis.md
    - Visualize: reference/reference_visualize.md

theme:
  name: "material"
  favicon: assets/icon.png
  logo: assets/logo.png
  language: en
  # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/#primary-color
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - content.code.annotate
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - content.tabs.link
    # - header.autohide
    # - navigation.expand
    # - navigation.instant
    # - navigation.tabs.sticky


plugins:
- search
- autorefs
- mkdocstrings:
    default_handler: python
    handlers:
      python:
        rendering:
          show_source: true
        options:
          show_submodules: true
- mkdocs-jupyter:
    execute: true
    include_source: true
    custom_mathjax_url: "https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/latest.js?config=TeX-AMS_CHTML-full,Safe"

# Styled blocks: https://squidfunk.github.io/mkdocs-material/reference/admonitions/#supported-types
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - smarty
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/fontawesome.min.js
  - assets/solid.min.js
  - assets/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MiBiPreT/mibiscreen
  version:
    provider: mike
    default: latest
    alias: true
